name: CI/CD Pipeline with Regression Detection

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for vitest-coverage-report-action to post PR comments
    strategy:
      matrix:
        check: [lint, type-check, test]
      fail-fast: false
    name: ${{ matrix.check }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dagger quality gate
        if: matrix.check != 'test'
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: quality --check=${{ matrix.check }}

      - name: Run Dagger test coverage gate
        if: matrix.check == 'test'
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: test-coverage-artifacts --output=coverage

      - name: Generate coverage summary
        if: matrix.check == 'test' && always()
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | jq '.total' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Coverage Report
        if: matrix.check == 'test' && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          vite-config-path: vitest.config.ts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file-coverage-mode: changes

      - name: Update Coverage Badges
        if: matrix.check == 'test' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Generate badge JSON files with color logic
          for metric in lines branches functions statements; do
            VALUE=$(jq ".total.${metric}.pct" coverage/coverage-summary.json)

            # Color thresholds: brightgreen (≥80%), yellow (≥70%), red (<70%)
            if (( $(echo "$VALUE >= 80" | bc -l) )); then
              COLOR="brightgreen"
            elif (( $(echo "$VALUE >= 70" | bc -l) )); then
              COLOR="yellow"
            else
              COLOR="red"
            fi

            # Capitalize metric for label
            LABEL=$(echo "$metric" | sed 's/.*/\u&/')
            echo "{\"schemaVersion\":1,\"label\":\"$LABEL\",\"message\":\"${VALUE}%\",\"color\":\"$COLOR\"}" > /tmp/coverage-${metric}.json
          done

          # Update all badge files atomically via API (avoids 409 conflicts)
          jq -n \
            --arg lines "$(cat /tmp/coverage-lines.json)" \
            --arg branches "$(cat /tmp/coverage-branches.json)" \
            --arg functions "$(cat /tmp/coverage-functions.json)" \
            --arg statements "$(cat /tmp/coverage-statements.json)" \
            '{files: {
              "coverage-lines.json": {content: $lines},
              "coverage-branches.json": {content: $branches},
              "coverage-functions.json": {content: $functions},
              "coverage-statements.json": {content: $statements}
            }}' | gh api --method PATCH /gists/${{ vars.COVERAGE_GIST_ID }} --input -

  validation:
    runs-on: ubuntu-latest
    name: validation-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dagger validation gate
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: validation

  docs:
    runs-on: ubuntu-latest
    name: docs-link-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dagger docs link check
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: docs-link-check

  build:
    runs-on: ubuntu-latest
    needs: [quality-checks, validation]

    # ENVIRONMENT VARIABLES DOCUMENTATION
    # ====================================
    # This job requires the following environment variables:
    #
    # Required for Convex (backend):
    # - CONVEX_DEPLOYMENT: The Convex deployment identifier (used for codegen)
    # - NEXT_PUBLIC_CONVEX_URL: The public Convex URL (embedded in client bundle)
    #
    # Required for Clerk (authentication):
    # - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: Public key for Clerk auth (embedded in client bundle)
    #
    # Optional:
    # - None currently
    #
    # IMPORTANT: Only NEXT_PUBLIC_* prefixed variables are embedded in the client bundle.
    # Server-side variables (without NEXT_PUBLIC_ prefix) remain secure on the server.
    #
    # These variables must be provided at:
    # 1. Build time - for Next.js to embed them in the client bundle
    # 2. Runtime - for the production server to start without errors

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dagger build gate and export build artifacts
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: build-artifacts --next-public-convex-url=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} --next-public-clerk-publishable-key=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} --output=.next

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: .next/
          include-hidden-files: true

  e2e:
    runs-on: ubuntu-latest
    needs: build
    name: e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: .next/

      - name: Run Dagger e2e gate and export report artifacts
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: e2e-artifacts --next-public-convex-url=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} --next-public-clerk-publishable-key=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} --clerk-secret-key=env:CLERK_SECRET_KEY --output=.dagger-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: .dagger-e2e/playwright-report/
          retention-days: 7

      - name: Fail if e2e test run failed
        run: |
          if [ ! -f .dagger-e2e/exit-code ]; then
            echo "❌ Missing e2e exit code artifact"
            exit 1
          fi

          code=$(cat .dagger-e2e/exit-code)
          if [ "$code" != "0" ]; then
            echo "❌ e2e tests failed with exit code $code"
            exit "$code"
          fi

          echo "✅ e2e tests passed"

  # Single required status check for branch protection.
  # Gates on all real CI jobs so only one check name needs to be configured.
  merge-gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [quality-checks, validation, docs, build, e2e, verify-environment]
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more required jobs were cancelled"
            exit 1
          fi
          echo "✅ All required jobs passed"

  # Verify environment configuration before merge
  # Validates format and presence of required env vars
  verify-environment:
    name: Verify Environment Config
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'master' || github.base_ref == 'main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dagger CI environment validation
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: verify-env-config --environment=ci --next-public-convex-url=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} --next-public-clerk-publishable-key=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} --clerk-secret-key=env:CLERK_SECRET_KEY --convex-deploy-key=env:CONVEX_DEPLOY_KEY
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Run Dagger production environment validation
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: verify-env-config --environment=production --next-public-convex-url=${{ secrets.NEXT_PUBLIC_CONVEX_URL }} --next-public-clerk-publishable-key=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} --next-public-stripe-publishable-key=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} --stripe-price-monthly=${{ secrets.STRIPE_PRICE_MONTHLY }} --stripe-price-annual=${{ secrets.STRIPE_PRICE_ANNUAL }} --clerk-secret-key=env:CLERK_SECRET_KEY --stripe-secret-key=env:STRIPE_SECRET_KEY --stripe-webhook-secret=env:STRIPE_WEBHOOK_SECRET --stripe-sync-secret=env:STRIPE_SYNC_SECRET
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_SYNC_SECRET: ${{ secrets.STRIPE_SYNC_SECRET }}

      - name: Run Dagger Stripe live validation
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: verify-stripe-config --next-public-stripe-publishable-key=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} --stripe-price-monthly=${{ secrets.STRIPE_PRICE_MONTHLY }} --stripe-price-annual=${{ secrets.STRIPE_PRICE_ANNUAL }} --require-live=true --stripe-secret-key=env:STRIPE_SECRET_KEY --stripe-webhook-secret=env:STRIPE_WEBHOOK_SECRET
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
