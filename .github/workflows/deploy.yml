name: Deploy to Production

on:
  push:
    branches:
      - main
      - master # Include both common default branch names

env:
  NODE_VERSION: 20

jobs:
  deploy:
    name: Deploy to Convex and Vercel
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Needed for git history if required

      # Step 2: Validate required secrets (fail fast)
      - name: Validate required secrets
        id: validate-secrets
        run: |
          errors=0

          check_required() {
            if [ -z "$1" ]; then
              echo "::error::Missing required secret: $2"
              errors=$((errors + 1))
            else
              echo "✓ $2"
            fi
          }

          echo "=== Required Secrets ==="
          check_required "$CLERK_KEY" "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          check_required "$CONVEX_URL" "NEXT_PUBLIC_CONVEX_URL"
          check_required "$CONVEX_KEY" "CONVEX_DEPLOY_KEY"
          check_required "$PUBLIC_CANARY_API_KEY" "NEXT_PUBLIC_CANARY_API_KEY (browser Canary ingest-only key; never admin/read)"
          check_required "$SERVER_CANARY_API_KEY" "CANARY_API_KEY (server and Convex Canary ingest-only key; never admin/read)"

          if [ $errors -gt 0 ]; then
            echo ""
            echo "::error::$errors required secret(s) missing. Add them at:"
            echo "GitHub repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          CLERK_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          CONVEX_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
          SERVER_CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}

      # Step 3: Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Step 3.5: Validate environment configuration
      - name: Validate production environment configuration
        run: node scripts/verify-env-config.mjs production
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_SYNC_SECRET: ${{ secrets.STRIPE_SYNC_SECRET }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
          CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}

      - name: Validate browser Canary key scope
        run: node scripts/verify-canary-key-scope.mjs
        env:
          CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
          CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
          CANARY_SCOPE_LABEL: NEXT_PUBLIC_CANARY_API_KEY
          CANARY_SERVICE: chrondle
          CANARY_ENVIRONMENT: production

      - name: Validate server Canary key scope
        run: node scripts/verify-canary-key-scope.mjs
        env:
          CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
          CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}
          CANARY_SCOPE_LABEL: CANARY_API_KEY
          CANARY_SERVICE: chrondle
          CANARY_ENVIRONMENT: production

      - name: Validate Stripe prices exist
        run: node scripts/verify-stripe-config.mjs --live
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      # Step 4: Build Next.js app
      - name: Build Next.js application
        run: bun run build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
          NEXT_PUBLIC_CANARY_API_KEY: ${{ secrets.NEXT_PUBLIC_CANARY_API_KEY }}
          NEXT_PUBLIC_CANARY_ENVIRONMENT: production
          CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}
          CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}
          CANARY_ENVIRONMENT: production

      # Step 5: Deploy to Convex (production)
      # Note: CONVEX_DEPLOY_KEY starting with "prod:" triggers production deploy
      - name: Configure Convex Canary runtime
        run: |
          endpoint="${CANARY_ENDPOINT:-https://canary-obs.fly.dev}"
          npx convex env set CANARY_API_KEY "$CANARY_API_KEY"
          npx convex env set CANARY_ENDPOINT "$endpoint"
          npx convex env set CANARY_ENVIRONMENT production
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CANARY_API_KEY: ${{ secrets.CANARY_API_KEY }}
          CANARY_ENDPOINT: ${{ secrets.NEXT_PUBLIC_CANARY_ENDPOINT }}

      - name: Deploy to Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      # Step 6: Verify deployment
      - name: Verify deployment
        run: bun run deploy:verify
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

      # Optional: Deploy to Vercel (if using Vercel for hosting)
      # Uncomment the following if deploying to Vercel
      # - name: Deploy to Vercel
      #   uses: vercel/actions/deploy@v1
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     production: true

  # Optional: Send notification on deployment status
  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send success notification
        if: ${{ needs.deploy.result == 'success' }}
        run: echo "✅ Deployment successful!"

      - name: Send failure notification
        if: ${{ needs.deploy.result == 'failure' }}
        run: echo "❌ Deployment failed!"
